services:
  - type: web
    name: bici
    runtime: node
    plan: free
    buildCommand: npm ci --no-audit --no-fund && npm run build
    startCommand: npm run start -- --port $PORT
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false

